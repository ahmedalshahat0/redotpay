<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="meta_title">RedotPay</title>
<meta name="description" data-i18n-attr="content:meta_description" content="">
<meta property="og:title" data-i18n-attr="content:meta_title" content="">
<meta property="og:description" data-i18n-attr="content:meta_description" content="">
<meta property="og:type" content="website">
<meta property="og:url" content="" id="og-url">
<meta property="og:image" content="https://cdn.brandfetch.io/id6Ks2R87q/w/400/h/400/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1781715092233" id="og-image">
<meta property="og:image:width" content="400">
<meta property="og:image:height" content="400">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" data-i18n-attr="content:meta_title" content="">
<meta name="twitter:description" data-i18n-attr="content:meta_description" content="">
<meta name="twitter:image" content="https://cdn.brandfetch.io/id6Ks2R87q/w/400/h/400/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1781715092233" id="twitter-image">
<meta name="google-site-verification" content="ObbsS9CzjBrCLZxq9pr45QmNLdb0RLVHu6PVTe4vgN8" />
<link rel="icon" id="favicon-link" href="https://cdn.brandfetch.io/id6Ks2R87q/w/400/h/400/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1781715092233">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Cairo:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "RedotPay Referral Offer",
  "description": "Independent affiliate landing page for RedotPay signup bonus."
}
</script>
</head>
<body>

<div class="bg-glow"></div>

<div class="page-loader" id="pageLoader"><div class="loader-dot"></div></div>

<!-- STICKY BANNER -->
<div class="sticky-banner">
  <div class="container">
    <span data-i18n="sticky_banner"></span>
    <a class="btn btn-primary" data-cta href="#" data-i18n="sticky_cta"></a>
  </div>
</div>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container">
    <a href="#top" class="nav-logo" id="navLogo">
      <span class="dot"></span>
      <span>RedotPay</span>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="#features" data-i18n="nav_features"></a>
      <a href="#how" data-i18n="nav_how"></a>
      <a href="#video" data-i18n="nav_video"></a>
      <a href="#faq" data-i18n="nav_faq"></a>
      <a class="btn btn-primary nav-cta-mobile" data-cta href="#" data-i18n="nav_cta" style="margin-top:12px"></a>
    </nav>
    <div class="nav-actions">
      <button class="lang-toggle" id="langToggle" aria-label="Switch language">
        <span id="langToggleLabel"></span>
      </button>
      <a class="btn btn-primary nav-cta-desktop" data-cta href="#" data-i18n="nav_cta"></a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<main id="top">

  <!-- HERO -->
  <section class="hero">
    <div class="container hero-grid">
      <div class="hero-copy reveal">
        <span class="badge">⚠️ <span data-i18n="hero_badge"></span></span>
        <h1>
          <span data-i18n="hero_title_line1"></span><br>
          <span class="accent-text" data-i18n="hero_title_line2"></span>
        </h1>
        <p class="hero-subtitle" data-i18n="hero_subtitle"></p>

        <div class="hero-offers">
          <span class="offer-chip"><span class="ic">🎁</span><span data-i18n="hero_offer_1"></span></span>
          <span class="offer-chip"><span class="ic">💳</span><span data-i18n="hero_offer_2"></span></span>
          <span class="offer-chip"><span class="ic">⚡</span><span data-i18n="hero_offer_3"></span></span>
        </div>

        <div class="hero-ctas">
          <a class="btn btn-primary btn-lg" data-cta href="#" data-i18n="hero_cta_primary"></a>
          <a class="btn btn-secondary btn-lg" data-video-trigger href="#" data-i18n="hero_cta_secondary"></a>
        </div>

        <div class="hero-trust">
          <span class="avatar-stack"><span></span><span></span><span></span><span></span></span>
          <span data-i18n="hero_trust_note"></span>
        </div>
      </div>

      <div class="hero-visual reveal">
        <div class="hero-card">
          <img data-img="hero" alt="RedotPay app preview" style="display:none">
          <div class="placeholder-fill" data-img-fallback="hero">Hero image — set CONFIG.images.hero</div>
        </div>
        <div class="float-card f1">🎁 +$5 <span data-i18n="promo_bonus_label" style="font-weight:400;color:var(--text-muted);display:block;font-size:11px"></span></div>
        <div class="float-card f2">💳 -50% <span data-i18n="promo_card_label" style="font-weight:400;color:var(--text-muted);display:block;font-size:11px"></span></div>
      </div>
    </div>
  </section>

  <!-- TRUST / COUNTERS -->
  <section class="trust-section">
    <div class="container">
      <h3 data-i18n="trust_title"></h3>
      <div class="counters">
        <div class="reveal">
          <div class="counter-num" data-counter data-value="8.0" data-suffix="M+">0</div>
          <div class="counter-label" data-i18n="trust_users_label"></div>
        </div>
        <div class="reveal">
          <div class="counter-num" data-counter data-value="100" data-suffix="+">0</div>
          <div class="counter-label" data-i18n="trust_countries_label"></div>
        </div>
        <div class="reveal">
          <div class="counter-num" data-counter data-value="12.0" data-prefix="$" data-suffix="B">0</div>
          <div class="counter-label" data-i18n="trust_volume_label"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- WHY CHOOSE -->
  <section id="features">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="why_eyebrow"></span>
        <h2 data-i18n="why_title"></h2>
        <p data-i18n="why_subtitle"></p>
      </div>
      <div class="grid-cards" id="featureGrid"></div>
    </div>
  </section>

  <!-- USE CASES -->
  <section>
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="usecases_eyebrow"></span>
        <h2 data-i18n="usecases_title"></h2>
      </div>
      <div class="usecase-grid" id="usecaseGrid"></div>
    </div>
  </section>

  <!-- PROMOTION -->
  <section>
    <div class="container">
      <div class="promo-card reveal">
        <span class="eyebrow" data-i18n="promo_eyebrow"></span>
        <h2 data-i18n="promo_title"></h2>
        <div class="promo-values">
          <div class="promo-value">
            <div class="num" data-config="promotion.bonus"></div>
            <div class="lbl" data-i18n="promo_bonus_label"></div>
          </div>
          <span class="promo-plus">+</span>
          <div class="promo-value">
            <div class="num" data-config="promotion.virtualCardDiscount"></div>
            <div class="lbl" data-i18n="promo_card_label"></div>
          </div>
        </div>
        <a class="btn btn-primary btn-lg" data-cta href="#" data-i18n="promo_cta"></a>
        <p class="promo-note" data-i18n="promo_note"></p>
      </div>
    </div>
  </section>

  <!-- REGISTRATION STEPS -->
  <section id="how">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="steps_eyebrow"></span>
        <h2 data-i18n="steps_title"></h2>
      </div>
      <div class="timeline" id="stepsGrid"></div>
    </div>
  </section>

  <!-- VIDEO TUTORIAL -->
  <section id="video">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="video_eyebrow"></span>
        <h2 data-i18n="video_title"></h2>
        <p data-i18n="video_subtitle"></p>
      </div>
      <div class="video-wrap reveal">
        <div class="video-frame" data-video-trigger>
          <img data-img="dashboard" alt="" style="display:none">
          <div class="play-btn">▶</div>
        </div>
        <div class="video-ready">
          <h3 data-i18n="video_ready_title"></h3>
          <a class="btn btn-primary btn-lg" data-cta href="#" data-i18n="video_cta"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- GALLERY -->
  <section>
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="gallery_eyebrow"></span>
        <h2 data-i18n="gallery_title"></h2>
      </div>
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </section>

  <!-- TESTIMONIALS -->
  <section>
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="testimonials_eyebrow"></span>
        <h2 data-i18n="testimonials_title"></h2>
      </div>
      <div class="testi-track-wrap reveal">
        <div class="testi-track" id="testiTrack"></div>
      </div>
      <div class="testi-controls">
        <button id="testiPrev" aria-label="Previous">‹</button>
        <button id="testiNext" aria-label="Next">›</button>
      </div>
    </div>
  </section>

  <!-- FAQ -->
  <section id="faq">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="faq_eyebrow"></span>
        <h2 data-i18n="faq_title"></h2>
      </div>
      <div class="faq-list" id="faqList"></div>
    </div>
  </section>

  <!-- FINAL CTA -->
  <section>
    <div class="container">
      <div class="final-cta reveal">
        <h2 data-i18n="final_title"></h2>
        <p data-i18n="final_subtitle"></p>
        <a class="btn btn-primary btn-lg" data-cta href="#" data-i18n="final_cta"></a>
      </div>
    </div>
  </section>

</main>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-disclosure">
      <strong data-i18n="footer_disclosure_title"></strong>
      <span data-i18n="footer_disclosure_text"></span>
    </div>
    <div class="footer-grid">
      <a href="#top" class="nav-logo"><span class="dot"></span><span>RedotPay</span></a>
      <div class="footer-links">
        <a href="#" data-i18n="footer_privacy"></a>
        <a href="#" data-i18n="footer_terms"></a>
      </div>
      <div class="footer-social" id="footerSocial"></div>
    </div>
    <p class="footer-bottom" data-i18n="footer_copyright"></p>
  </div>
</footer>

<!-- FLOATING CTA -->
<div class="floating-cta" id="floatingCta">
  <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>
  <a class="btn btn-primary" data-cta href="#" data-i18n="hero_cta_primary"></a>
</div>

<!-- VIDEO MODAL -->
<div id="videoModal" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:900px;aspect-ratio:16/9;position:relative">
    <button id="videoModalClose" aria-label="Close" style="position:absolute;top:-44px;inset-inline-end:0;color:#fff;font-size:28px;background:none;border:none;cursor:pointer">✕</button>
    <div id="videoModalBody" style="width:100%;height:100%;background:#0a0b0f;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#9498A8;font-size:14px;text-align:center;padding:20px">
      Set CONFIG.youtubeVideo to embed the tutorial
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="lang/en.js"></script>
<script src="lang/ar.js"></script>
<script src="js/main.js"></script>
</body>
</html>
